  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1a1e2a;
    --surface3: #1f2433;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #eef0f6;
    --muted: #7a82a0;
    --dim: #3a4060;
    --accent: #7c6af7;
    --accent-light: rgba(124,106,247,0.15);
  }

  #app {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 600px;
    position: relative;
    overflow: hidden;
  }

  .glow-bg {
    position: absolute;
    top: -150px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LOGIN ── */
  #screen-login {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 600px;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .login-box {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    animation: fadeUp .4s both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .login-logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .login-logo .icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .login-logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    letter-spacing: .06em;
  }
  .login-logo p {
    font-size: 11px; color: var(--muted);
    letter-spacing: .07em; text-transform: uppercase;
    margin-top: 1px;
  }

  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px; font-weight: 700;
    margin-bottom: .4rem;
  }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }

  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--muted); letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--dim); }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    margin-top: .4rem;
    transition: opacity .2s, transform .15s;
  }
  .btn-login:hover { opacity: .88; transform: translateY(-1px); }
  .btn-login:active { transform: scale(.98); }

  .error-msg {
    font-size: 12px; color: #f87171;
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .hint-grid {
    margin-top: 1.8rem;
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
  }
  .hint-grid p {
    font-size: 11px; color: var(--dim);
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hint-pills {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .hint-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .hint-pill:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DASHBOARD ── */
  #screen-dash { display: none; position: relative; z-index: 1; }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 10px;
  }
  .dash-header-left { display: flex; align-items: center; gap: 12px; }
  .dash-logo {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800;
    letter-spacing: .06em;
    display: flex; align-items: center; gap: 8px;
  }
  .dash-logo .dot {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .dash-role-badge {
    font-size: 11px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid;
  }
  .dash-user {
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  }
  .user-info p { font-size: 13px; font-weight: 500; }
  .user-info span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .btn-logout {
    font-size: 12px; color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
    cursor: pointer; transition: color .15s, border-color .15s;
  }
  .btn-logout:hover { color: #f87171; border-color: rgba(248,113,113,.3); }

  .dash-body { padding: 1.5rem; }

  .dash-welcome {
    margin-bottom: 1.5rem;
    animation: fadeUp .4s both;
  }
  .dash-welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    line-height: 1.2;
  }
  .dash-welcome h2 span { color: var(--accent); }
  .dash-welcome p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    animation: fadeUp .5s both;
  }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .kpi-val {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
  }
  .kpi-val small { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 4px; }

  .modules-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .modules-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .mod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    animation: fadeUp .5s both;
    position: relative;
    overflow: hidden;
  }
  .mod-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,106,247,.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .2s;
  }
  .mod-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .mod-card:hover::after { opacity: 1; }
  .mod-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-bottom: 10px;
  }
  .mod-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    margin-bottom: 4px;
  }
  .mod-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .mod-status {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 10px;
    margin-top: 8px; border: 1px solid;

  .activity-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;

  .activity-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .activity-list { display: flex; flex-direction: column; gap: 6px; }
  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;

  }

  .act-text { flex: 1; color: var(--muted); }
  .act-text strong { color: var(--text); font-weight: 500; }

</style>

</div>

const HINTS = [
  { label:"admin", email:"admin@sigprod.com" },
  { label:"PO", email:"po@sigprod.com" },
  { label:"SM", email:"pm@sigprod.com" },
  { label:"BA", email:"analista@sigprod.com" },
  { label:"FE", email:"frontend@sigprod.com" },
  { label:"BE", email:"backend@sigprod.com" },
  { label:"QA", email:"qa@sigprod.com" },
  { label:"DevOps", email:"devops@sigprod.com" }
];

const hintContainer = document.getElementById('hints');
HINTS.forEach(h => {
  const el = document.createElement('div');
  el.className = 'hint-pill';
  el.textContent = h.label;
  el.onclick = () => {
    document.getElementById('inp-email').value = h.email;
    document.getElementById('inp-pass').value = 'admin123';
  };
  hintContainer.appendChild(el);
});

document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const email = document.getElementById('inp-email').value.trim().toLowerCase();
  const pass  = document.getElementById('inp-pass').value;
  const err   = document.getElementById('err-msg');

  if (pass !== 'admin123') { err.className = 'error-msg show'; return; }
  const user = USERS[email];
  if (!user) { err.className = 'error-msg show'; return; }
  err.className = 'error-msg';

  renderDash(user, email);
}

function doLogout() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-dash').style.display = 'none';
  document.getElementById('inp-pass').value = '';
}

function renderDash(user, email) {
  const data = DASH_DATA[user.role];
  if (!data) return;

  const badge = document.getElementById('dash-badge');
  badge.textContent = user.code + ' · ' + user.name;
  badge.style.color = user.color;
  badge.style.borderColor = user.color.replace(')', ', 0.3)').replace('rgb', 'rgba');
  badge.style.background = user.bg;

  const av = document.getElementById('dash-avatar');
  av.textContent = user.code;
  av.style.background = user.bg;
  av.style.color = user.color;

  document.getElementById('dash-uname').textContent = user.name;
  document.getElementById('dash-uemail').textContent = email;

  const body = document.getElementById('dash-body');
  body.innerHTML = '';

  const welcome = document.createElement('div');
  welcome.className = 'dash-welcome';
  welcome.innerHTML = `<h2>${data.welcome}</h2><p>${data.sub}</p>`;
  body.appendChild(welcome);

  const kpiRow = document.createElement('div');
  kpiRow.className = 'kpi-row';
  data.kpis.forEach((k, i) => {
    const c = document.createElement('div');
    c.className = 'kpi-card';
    c.style.animationDelay = (i * .06) + 's';
    c.innerHTML = `<div class="kpi-label">${k.label}</div><div class="kpi-val">${k.val}<small>${k.unit}</small></div>`;
    kpiRow.appendChild(c);
  });
  body.appendChild(kpiRow);

  const mt = document.createElement('div');
  mt.className = 'modules-title';
  mt.textContent = 'Módulos disponibles';
  body.appendChild(mt);

  const grid = document.createElement('div');
  grid.className = 'modules-grid';
  data.modules.forEach((m, i) => {
    const c = document.createElement('div');
    c.className = 'mod-card';
    c.style.animationDelay = (i * .07) + 's';
    const sc = m.status === 'activo'
      ? `color:${user.color};border-color:${user.color.replace(')', ',0.3)').replace('rgb','rgba')};background:${user.bg}`
      : 'color:var(--muted);border-color:var(--border)';
    c.innerHTML = `
      <div class="mod-icon" style="background:${user.bg}">${m.icon}</div>
      <div class="mod-name">${m.name}</div>
      <div class="mod-desc">${m.desc}</div>
      <span class="mod-status" style="${sc}">${m.status}</span>`;
    grid.appendChild(c);
  });
  body.appendChild(grid);

  const at = document.createElement('div');
  at.className = 'activity-title';
  at.textContent = 'Actividad reciente';
  body.appendChild(at);

  const al = document.createElement('div');
  al.className = 'activity-list';
  data.activity.forEach((a, i) => {
    const c = document.createElement('div');
    c.className = 'activity-item';
    c.style.animationDelay = (i * .06) + 's';
    c.innerHTML = `<div class="act-dot" style="background:${a.color}"></div><div class="act-text">${a.text}</div><div class="act-time">${a.time}</div>`;
    al.appendChild(c);
  });
  body.appendChild(al);

  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
}
</script>
